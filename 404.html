<!DOCTYPE html>
<html lang="en" class="no-js dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1612">
<meta name="color-scheme" content="dark">
<script>document.documentElement.classList.replace('no-js','js');document.documentElement.classList.add('dark');</script>
<title>Page Not Found — Woofbox</title>
<meta name="description" content="The page you're looking for doesn't exist. Return to Woofbox homepage.">
<meta name="robots" content="noindex">
<link rel="canonical" href="https://woofbox.nyc/">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=General+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/layout.css">
<style>
.error-content {
  min-height: 60vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: var(--section-padding);
}
.error-code {
  font-family: var(--font-accent);
  font-size: clamp(6rem, 20vw, 12rem);
  font-weight: 500;
  line-height: 1;
  color: var(--color-coral);
  margin-bottom: var(--space-lg);
}
.error-title {
  font-family: var(--font-serif);
  font-size: var(--text-mega);
  font-weight: 500;
  margin-bottom: var(--space-md);
  color: var(--color-text-primary);
}
.error-text {
  font-size: var(--text-lg);
  color: var(--color-text-secondary);
  margin-bottom: var(--space-3xl);
  max-width: 40ch;
  margin-inline: auto;
}
</style>
</head>
<body>

<nav class="navbar" id="navbar" aria-label="Main navigation">
  <div class="container">
    <div class="navbar__inner">
      <a href="index.html" class="navbar__logo" translate="no"><img src="assets/woofbox_logo_white.png" alt="Woofbox Logo" class="navbar__logo-img" width="600" height="210"></a>
      <div class="navbar__links">
        <a href="about.html" class="navbar__link">About</a>
        <a href="index.html#shop" class="navbar__link">Shop</a>
        <a href="index.html#grooming" class="navbar__link">Grooming</a>
        <a href="index.html#contact" class="navbar__link">Contact</a>
      </div>
      <div class="navbar__actions">
        <a href="index.html" class="navbar__cta">Home</a>
      </div>
      <button type="button" class="navbar__mobile-toggle" id="mobileToggle" aria-label="Open menu" aria-expanded="false">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </button>
    </div>
  </div>
</nav>

<main id="main" class="error-content">
  <div>
    <p class="error-code" aria-hidden="true">404</p>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-text">The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>
    <a href="/" class="btn btn--coral">Return Home</a>
  </div>
</main>

<footer class="footer">
  <div class="container">
    <div class="footer__bottom" style="border-top: none; padding-top: 0; justify-content: center;">
      <p class="footer__copy">&copy; 2026 Woofbox. All rights reserved.</p>
    </div>
  </div>
</footer>

</body>
</html>
